<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>重定向中...</title>
    <script>
      var path = window.location.pathname;
      window.location.replace('/eat2/' + (path === '/eat2/' ? '' : path.replace('/eat2/', '')));
    </script>
  </head>
  <body>
    <p>如果页面没有自动跳转，<a href="/eat2/">请点击这里</a></p>
  </body>
</html>
